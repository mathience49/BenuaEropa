<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Penjelajahan - Eropa</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>

    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #eae5dd;
      animation: fadeIn 1s ease;
      margin: 0;
      overflow-x: hidden;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* NAVBAR */
    .navbar {
      background-color: #9b6b43;
      padding: 15px 40px;
      display: flex;
      justify-content: flex-end;
      gap: 40px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #f3e5c0;
      transform: translateY(-2px);
    }

    /* CONTAINER */
    .container {
      text-align: center;
      padding: 40px 20px;
    }

    /* TITLE */
    .title-box {
      border: 3px solid black;
      border-radius: 25px;
      padding: 20px;
      margin: 20px auto;
      width: 80%;
      max-width: 700px;
      animation: slideUp 0.8s ease;
    }

    .title-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
    }

    /* TOPICS (1 KOLOM) */
    .topics {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
    }

    .topic {
      border: 3px solid black;
      border-radius: 25px;
      padding: 25px;
      width: 80%;
      max-width: 600px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      animation: slideUp 1s ease;
      text-align: center;
      background-color: #eae5dd;
    }

    .topic:hover {
      background-color: #e3d6b8;
      transform: scale(1.05);
    }

    .topic:active {
      transform: scale(0.95);
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">UTAMA</a>
    <a href="#">PENJELAJAHAN</a>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <!-- TITLE -->
    <div class="title-box">
      <h1>Hallo, Ingin Menjelajahi Apa Hari Ini?</h1>
    </div>

    <!-- TOPICS -->
    <div class="topics">

  <div class="topic" onclick="location.href='peta.html'">🗺️ PETA</div>

  <div class="topic" onclick="location.href='artikel.html?topik=politik'">
    🏛️ Politik dan Ekonomi
  </div>

  <div class="topic" onclick="location.href='artikel.html?topik=bentang'">
    🌄 Bentang Alam
  </div>

  <div class="topic" onclick="location.href='artikel.html?topik=penduduk'">
    👥 Penduduk & Budaya
  </div>

  <div class="topic" onclick="location.href='artikel.html?topik=iptek'">
    📚 Peradaban & Ilmu Pengetahuan
  </div>

</div>

  </div>


</body>
</html>
